# This reference configration yaml is automatically generated via 'scripts/generate_trainer_config.sh'
# in which it invokes 'python3 scripts/print_cfg.py --cfg job model_engine=veomni' to flatten the 'verl/trainer/config/ppo_trainer.yaml' config fields into a single file.
# Do not modify this file directly.
# The file is usually only for reference and never used.

actor_rollout_ref:
  actor:
    optim:
      _target_: verl.workers.config.VeOmniOptimizerConfig
      optimizer: adamw
      lr: 1.0e-06
      lr_min: 0.0
      lr_start: 0.0
      lr_warmup_steps_ratio: 0.0
      lr_decay_ratio: 1.0
      total_training_steps: -1
      weight_decay: 0.01
      lr_warmup_steps: -1
      betas:
      - 0.9
      - 0.999
      clip_grad: 1.0
      lr_scheduler_type: cosine
      override_optimizer_config: {}
    veomni:
      _target_: verl.workers.config.VeOmniEngineConfig
      param_offload: false
      optimizer_offload: false
      fsdp_size: -1
      ulysses_parallel_size: 1
      expert_parallel_size: 1
      mixed_precision: true
      seed: 42
      full_determinism: false
      init_device: meta
      enable_full_shard: true
      ckpt_manager: dcp
      forward_prefetch: true
      strategy: veomni
      use_torch_compile: false
      forward_only: false
      enable_fsdp_offload: false
      enable_reentrant: false
      attn_implementation: flash_attention_2
      moe_implementation: fused
      cross_entropy_loss_implementation: eager
      rms_norm_implementation: eager
      swiglu_mlp_implementation: eager
      rotary_pos_emb_implementation: eager
      load_balancing_loss_implementation: eager
      force_use_huggingface: false
      activation_gpu_limit: 0.0
    _target_: verl.workers.config.VeOmniActorConfig
    rollout_n: ${oc.select:actor_rollout_ref.rollout.n,1}
    strategy: veomni
    ppo_mini_batch_size: 256
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: null
    use_dynamic_bsz: false
    ppo_max_token_len_per_gpu: 16384
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    tau_pos: 1.0
    tau_neg: 1.05
    freeze_vision_tower: false
    policy_loss:
      _target_: verl.workers.config.PolicyLossConfig
      loss_mode: vanilla
      clip_cov_ratio: 0.0002
      clip_cov_lb: 1.0
      clip_cov_ub: 5.0
      kl_cov_ratio: 0.0002
      ppo_kl_coef: 0.1
    clip_ratio_c: 3.0
    loss_agg_mode: token-mean
    loss_scale_factor: null
    entropy_coeff: 0
    calculate_entropy: false
    calculate_sum_pi_squared: false
    use_kl_loss: false
    use_prefix_grouper: false
    use_torch_compile: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    shuffle: false
    data_loader_seed: 42
    checkpoint:
      _target_: verl.trainer.config.CheckpointConfig
      save_contents:
      - model
      - optimizer
      - extra
      load_contents: ${.save_contents}
      async_save: false
      mbridge_config: {}
    use_fused_kernels: ${oc.select:actor_rollout_ref.model.use_fused_kernels,false}
    profiler:
      _target_: verl.utils.profiler.ProfilerConfig
      tool: ${oc.select:global_profiler.tool,null}
      enable: false
      all_ranks: false
      ranks: []
      save_path: ${oc.select:global_profiler.save_path,null}
      tool_config:
        nsys:
          _target_: verl.utils.profiler.config.NsightToolConfig
          discrete: ${oc.select:global_profiler.global_tool_config.nsys.discrete}
        npu:
          _target_: verl.utils.profiler.config.NPUToolConfig
          contents: []
          level: level0
          analysis: true
          discrete: false
        torch:
          _target_: verl.utils.profiler.config.TorchProfilerToolConfig
          contents: []
          discrete: false
        torch_memory:
          _target_: verl.utils.profiler.config.TorchMemoryToolConfig
          trace_alloc_max_entries: ${oc.select:global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
          stack_depth: ${oc.select:global_profiler.global_tool_config.torch_memory.stack_depth,32}
        precision_debugger:
          _target_: verl.utils.profiler.config.PrecisionDebuggerToolConfig
          config_path: ${oc.select:global_profiler.global_tool_config.precision_debugger.config_path,null}
          steps: null
          stages: ${oc.select:global_profiler.global_tool_config.precision_debugger.stages,null}
          strict: ${oc.select:global_profiler.global_tool_config.precision_debugger.strict,False}
    router_replay:
      _target_: verl.workers.config.RouterReplayConfig
      mode: disabled
      record_file: null
      replay_file: null
    qat:
      enable: false
      mode: w4a16
      group_size: 16
      ignore_patterns:
      - lm_head
      - embed_tokens
      - re:.*mlp.gate$
      activation_observer: static_minmax
      quantization_config_path: null
  ref:
    rollout_n: ${oc.select:actor_rollout_ref.rollout.n,1}
    strategy: veomni
    use_torch_compile: ${oc.select:actor_rollout_ref.actor.use_torch_compile,true}
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: null
    log_prob_use_dynamic_bsz: ${oc.select:actor_rollout_ref.actor.use_dynamic_bsz,false}
    log_prob_max_token_len_per_gpu: ${oc.select:actor_rollout_ref.actor.ppo_max_token_len_per_gpu,16384}
    profiler:
      _target_: verl.utils.profiler.ProfilerConfig
      tool: ${oc.select:global_profiler.tool,null}
      enable: false
      all_ranks: false
      ranks: []
      save_path: ${oc.select:global_profiler.save_path,null}
      tool_config:
        nsys:
          _target_: verl.utils.profiler.config.NsightToolConfig
          discrete: ${oc.select:global_profiler.global_tool_config.nsys.discrete}
        npu:
          _target_: verl.utils.profiler.config.NPUToolConfig
          contents: []
          level: level0
          analysis: true
          discrete: false
        torch:
          _target_: verl.utils.profiler.config.TorchProfilerToolConfig
          contents: []
          discrete: false
        torch_memory:
          _target_: verl.utils.profiler.config.TorchMemoryToolConfig
          trace_alloc_max_entries: ${oc.select:global_profiler.global_tool_config.torch_memory.trace_alloc_max_entries,100000}
          stack_depth: ${oc.select:global_profiler.global_tool_config.torch_memory.stack_depth,32}
        precision_debugger:
          _target_: verl.utils.profiler.config.PrecisionDebuggerToolConfig
          config_path: ${oc.select:global_profiler.global_tool_config.precision_debugger.config_path,null}
          steps: null
          stages: ${oc.select:global_profiler.global_tool_config.precision_debugger.stages,null}
          strict: ${oc.select:global_profiler.global_tool_config.precision_debugger.strict,False}
    router_replay:
      _target_: verl.workers.config.RouterReplayConfig
      mode: disabled
      record_file: null
      replay_file: null
    veomni:
      _target_: verl.workers.config.VeOmniEngineConfig
      param_offload: ${oc.select:actor_rollout_ref.actor.veomni.param_offload,False}
      optimizer_offload: false
      fsdp_size: ${oc.select:actor_rollout_ref.actor.veomni.fsdp_size,-1}
      ulysses_parallel_size: ${oc.select:actor_rollout_ref.actor.veomni.ulysses_parallel_size,1}
      expert_parallel_size: ${oc.select:actor_rollout_ref.actor.veomni.expert_parallel_size,1}
      mixed_precision: true
      seed: ${oc.select:actor_rollout_ref.actor.veomni.seed,42}
      full_determinism: false
      init_device: meta
      enable_full_shard: true
      ckpt_manager: dcp
      forward_prefetch: true
      strategy: veomni
      use_torch_compile: false
      forward_only: true
      enable_fsdp_offload: false
      enable_reentrant: false
      attn_implementation: ${oc.select:actor_rollout_ref.actor.veomni.attn_implementation,flash_attention_2}
      moe_implementation: ${oc.select:actor_rollout_ref.actor.veomni.moe_implementation,fused}
      cross_entropy_loss_implementation: ${oc.select:actor_rollout_ref.actor.veomni.cross_entropy_loss_implementation,eager}
      rms_norm_implementation: ${oc.select:actor_rollout_ref.actor.veomni.rms_norm_implementation,eager}
      swiglu_mlp_implementation: ${oc.select:actor_rollout_ref.actor.veomni.swiglu_mlp_implementation,eager}
      rotary_pos_emb_implementation: ${oc.select:actor_rollout_ref.actor.veomni.rotary_pos_emb_implementation,eager}
      load_balancing_loss_implementation: ${oc.select:actor_rollout_ref.actor.veomni.load_balancing_loss_implementation,eager}
      force_use_huggingface: false
      activation_gpu_limit: 0.0
    _target_: verl.workers.config.VeOmniActorConfig
  rollout:
    _target_: verl.workers.config.RolloutConfig
    name: ???
    mode: async
    nnodes: 0
    n_gpus_per_node: ${oc.select:trainer.n_gpus_per_node,8}
    temperature: 1.0
    top_k: -1
    top_p: 1
    prompt_length: ${oc.select:data.max_prompt_length,512}
    response_length: ${oc.select:data.max_response_length,512}
    dtype: bfloat16
    gpu_memory_utilization: 0.5
    ignore_eos: false
    enforce_eager: false
    cudagraph_capture_sizes: null
    free_cache_engine: true
    tensor_model_parallel_size: 2
    data_parallel_size: 1
    expert_parallel_size: 1
    pipeline_model_parallel_size: 1
    max_num_batched_tokens: 8192
    max_model_len: null
    max_num_seqs: 1024
    enable_chunked_prefill: true
    enable_prefix_caching: true
    logprobs_mode: processed_logprobs
    scheduling_policy: fcfs
    load_format: dummy
    layered_summon: false
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: null
    log_prob_use_dynamic_bsz: ${oc.select:actor_rollout_ref.actor.use_dynamic_bsz,false}
    log_prob_max_token_len_per_gpu: ${oc.select:actor_rollout_ref.actor.ppo_max_token_len_per_gpu,16384}
    disable_log_stats: true
    do_sample: true
    'n': 1
    over_sample_rate: 0
    multi_stage_wake_up: false
    engine_kwargs:
      vllm: {}
      sglang: {}
      trtllm: {}
    val_kwargs:
